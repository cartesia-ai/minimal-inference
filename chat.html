<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>minimal-inference</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0f0f0f;
    color: #e0e0e0;
    height: 100vh;
    display: flex;
  }

  /* Sidebar */
  .sidebar {
    width: 280px;
    background: #1a1a1a;
    border-right: 1px solid #2a2a2a;
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    overflow: hidden;
  }

  .sidebar-section {
    padding: 16px 16px 0;
  }

  .sidebar h2 {
    font-size: 12px;
    font-weight: 600;
    color: #666;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 10px;
  }

  /* Conversation list */
  .conv-list {
    flex: 1;
    overflow-y: auto;
    padding: 0 8px;
    min-height: 0;
  }

  .conv-list::-webkit-scrollbar { width: 4px; }
  .conv-list::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

  .conv-item {
    display: flex;
    align-items: center;
    padding: 8px 10px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    color: #aaa;
    transition: background 0.1s;
    gap: 8px;
  }

  .conv-item:hover { background: #252525; }
  .conv-item.active { background: #2a2a2a; color: #e0e0e0; }

  .conv-item .conv-title {
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .conv-item .conv-delete {
    display: none;
    background: none;
    border: none;
    color: #666;
    cursor: pointer;
    font-size: 14px;
    padding: 0 4px;
  }

  .conv-item:hover .conv-delete { display: block; }
  .conv-item .conv-delete:hover { color: #f66; }

  .btn-new-chat {
    margin: 8px;
    background: #6cf;
    border: none;
    border-radius: 6px;
    padding: 9px;
    color: #000;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.15s;
  }

  .btn-new-chat:hover { opacity: 0.85; }

  /* Settings panel */
  .settings-panel {
    border-top: 1px solid #2a2a2a;
    padding: 12px 16px;
  }

  .settings-toggle {
    font-size: 12px;
    color: #666;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    user-select: none;
  }

  .settings-toggle:hover { color: #aaa; }

  .settings-body {
    display: none;
    margin-top: 10px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .settings-body.collapsed { display: none; }

  .param-group {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .param-group label {
    font-size: 12px;
    color: #888;
    display: flex;
    justify-content: space-between;
  }

  .param-group label span {
    color: #6cf;
    font-family: 'SF Mono', Monaco, monospace;
    font-size: 11px;
  }

  .param-group input[type="range"] {
    -webkit-appearance: none;
    width: 100%;
    height: 3px;
    background: #333;
    border-radius: 2px;
    outline: none;
  }

  .param-group input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 12px;
    height: 12px;
    background: #6cf;
    border-radius: 50%;
    cursor: pointer;
  }

  .param-group input[type="text"],
  .param-group input[type="number"] {
    background: #222;
    border: 1px solid #333;
    border-radius: 5px;
    padding: 6px 8px;
    color: #e0e0e0;
    font-size: 12px;
    font-family: 'SF Mono', Monaco, monospace;
    outline: none;
  }

  .param-group input:focus { border-color: #6cf; }

  .param-group textarea {
    background: #222;
    border: 1px solid #333;
    border-radius: 5px;
    padding: 6px 8px;
    color: #e0e0e0;
    font-size: 12px;
    font-family: inherit;
    outline: none;
    resize: vertical;
    min-height: 48px;
  }

  .param-group textarea:focus { border-color: #6cf; }

  /* Main chat area */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
  }

  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .msg-wrap {
    max-width: 720px;
    display: flex;
    flex-direction: column;
  }

  .msg-wrap.user { align-self: flex-end; }
  .msg-wrap.assistant { align-self: flex-start; }

  .message {
    line-height: 1.6;
    font-size: 14px;
    position: relative;
  }

  .message.user {
    background: #1e3a5f;
    border-radius: 16px 16px 4px 16px;
    padding: 12px 16px;
  }

  .message.assistant {
    background: #1e1e1e;
    border-radius: 16px 16px 16px 4px;
    padding: 12px 16px;
    border: 1px solid #2a2a2a;
  }

  .message .content {
    white-space: pre-wrap;
    word-break: break-word;
  }

  .message .content code {
    background: #2a2a2a;
    padding: 1px 5px;
    border-radius: 3px;
    font-family: 'SF Mono', Monaco, monospace;
    font-size: 13px;
  }

  .message .content pre {
    background: #151515;
    border: 1px solid #2a2a2a;
    border-radius: 6px;
    padding: 12px;
    margin: 8px 0;
    overflow-x: auto;
    white-space: pre;
  }

  .message .content pre code { background: none; padding: 0; }

  .message .role-tag {
    font-size: 11px;
    font-weight: 600;
    color: #666;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 4px;
  }

  .message.user .role-tag { color: #6cf; }
  .message.assistant .role-tag { color: #8b8; }

  .msg-actions {
    display: none;
    gap: 2px;
    padding: 2px 4px;
  }

  .msg-wrap.user .msg-actions { justify-content: flex-end; }
  .msg-wrap.assistant .msg-actions { justify-content: flex-start; }
  .msg-wrap:hover .msg-actions { display: flex; }

  .msg-action-btn {
    background: none;
    border: 1px solid transparent;
    border-radius: 4px;
    padding: 3px 8px;
    color: #666;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .msg-action-btn:hover {
    color: #ccc;
    background: #2a2a2a;
    border-color: #333;
  }

  .edit-area {
    background: #252525;
    border: 1px solid #6cf;
    border-radius: 8px;
    padding: 10px 12px;
    color: #e0e0e0;
    font-size: 14px;
    font-family: inherit;
    resize: vertical;
    outline: none;
    width: 100%;
    min-height: 60px;
    line-height: 1.5;
  }

  .edit-buttons {
    display: flex;
    gap: 8px;
    padding: 6px 0;
  }

  .edit-buttons button {
    padding: 5px 14px;
    border-radius: 6px;
    font-size: 12px;
    cursor: pointer;
    border: 1px solid #333;
  }

  .edit-save { background: #6cf; color: #000; font-weight: 600; border-color: #6cf !important; }
  .edit-cancel { background: #2a2a2a; color: #ccc; }

  .cursor {
    display: inline-block;
    width: 7px;
    height: 15px;
    background: #6cf;
    margin-left: 2px;
    vertical-align: text-bottom;
    animation: blink 0.8s step-end infinite;
  }

  @keyframes blink { 50% { opacity: 0; } }

  .input-area {
    padding: 16px 24px;
    border-top: 1px solid #2a2a2a;
    background: #1a1a1a;
    display: flex;
    gap: 12px;
    align-items: flex-end;
  }

  .input-area textarea {
    flex: 1;
    background: #252525;
    border: 1px solid #333;
    border-radius: 10px;
    padding: 12px 16px;
    color: #e0e0e0;
    font-size: 14px;
    font-family: inherit;
    resize: none;
    outline: none;
    max-height: 150px;
    line-height: 1.5;
  }

  .input-area textarea:focus { border-color: #6cf; }

  .btn-send {
    background: #6cf;
    border: none;
    border-radius: 10px;
    padding: 12px 20px;
    color: #000;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.15s;
    white-space: nowrap;
  }

  .btn-send:hover { opacity: 0.85; }
  .btn-send:disabled { opacity: 0.4; cursor: not-allowed; }

  .messages::-webkit-scrollbar { width: 6px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }

  .empty-state {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #444;
    font-size: 15px;
  }
</style>
</head>
<body>

<div class="sidebar">
  <div class="sidebar-section">
    <button class="btn-new-chat" onclick="newConversation()">+ New Chat</button>
  </div>

  <div class="conv-list" id="conv-list"></div>

  <div class="settings-panel">
    <div class="settings-toggle" onclick="toggleSettings()">Settings</div>
    <div class="settings-body" id="settings-body">
      <div class="param-group">
        <label>API URL</label>
        <input type="text" id="api-url" value="http://localhost:8000">
      </div>
      <div class="param-group">
        <label>Temperature <span id="temp-val">0.7</span></label>
        <input type="range" id="temperature" min="0" max="2" step="0.05" value="0.7">
      </div>
      <div class="param-group">
        <label>Max Tokens</label>
        <input type="number" id="max-tokens" value="512" min="1" max="65536">
      </div>
      <div class="param-group">
        <label>System Prompt</label>
        <textarea id="system-prompt" placeholder="Optional..."></textarea>
      </div>
    </div>
  </div>
</div>

<div class="main">
  <div class="messages" id="messages">
    <div class="empty-state" id="empty-state">Send a message to start</div>
  </div>
  <div class="input-area">
    <textarea id="input" rows="1" placeholder="Message... (Enter to send, Shift+Enter for newline)" autofocus></textarea>
    <button class="btn-send" id="send-btn" onclick="sendMessage()">Send</button>
  </div>
</div>

<script>
const STORAGE_KEY = 'minimal-inference-conversations';

// State
let conversations = {}; // id -> { id, title, messages: [{role, content}], created }
let activeConvId = null;
let isGenerating = false;
let abortController = null;

const inputEl = document.getElementById('input');
const sendBtn = document.getElementById('send-btn');
const messagesDiv = document.getElementById('messages');
const convListEl = document.getElementById('conv-list');
const tempSlider = document.getElementById('temperature');
const tempVal = document.getElementById('temp-val');

// ---- Persistence ----

function saveAll() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify({ conversations, activeConvId }));
}

function loadAll() {
  try {
    const raw = JSON.parse(localStorage.getItem(STORAGE_KEY));
    if (raw && raw.conversations) {
      conversations = raw.conversations;
      activeConvId = raw.activeConvId;
    }
  } catch (e) { /* fresh start */ }
}

// ---- Conversation management ----

function genId() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
}

function getActiveMessages() {
  if (!activeConvId || !conversations[activeConvId]) return [];
  return conversations[activeConvId].messages;
}

function setActiveMessages(msgs) {
  if (!activeConvId || !conversations[activeConvId]) return;
  conversations[activeConvId].messages = msgs;
  saveAll();
}

function deriveTitle(messages) {
  const first = messages.find(m => m.role === 'user');
  if (!first) return 'New Chat';
  return first.content.slice(0, 40) + (first.content.length > 40 ? '...' : '');
}

function newConversation() {
  if (isGenerating) return;
  const id = genId();
  conversations[id] = { id, title: 'New Chat', messages: [], created: Date.now() };
  activeConvId = id;
  saveAll();
  renderConvList();
  renderChat();
}

function switchConversation(id) {
  if (isGenerating) return;
  if (id === activeConvId) return;
  activeConvId = id;
  saveAll();
  renderConvList();
  renderChat();
}

function deleteConversation(id, e) {
  e.stopPropagation();
  if (isGenerating) return;
  delete conversations[id];
  if (activeConvId === id) {
    const ids = Object.keys(conversations).sort((a, b) =>
      (conversations[b].created || 0) - (conversations[a].created || 0)
    );
    activeConvId = ids[0] || null;
  }
  saveAll();
  renderConvList();
  renderChat();
}

function renderConvList() {
  const sorted = Object.values(conversations).sort((a, b) => (b.created || 0) - (a.created || 0));
  convListEl.innerHTML = sorted.map(c => `
    <div class="conv-item ${c.id === activeConvId ? 'active' : ''}" onclick="switchConversation('${c.id}')">
      <span class="conv-title">${escapeHtml(c.title)}</span>
      <button class="conv-delete" onclick="deleteConversation('${c.id}', event)">&times;</button>
    </div>
  `).join('');
}

// ---- Rendering ----

function escapeHtml(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function renderContent(text) {
  let html = escapeHtml(text);
  html = html.replace(/```(\w*)\n?([\s\S]*?)```/g, '<pre><code>$2</code></pre>');
  html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
  return html;
}

function renderChat() {
  const msgs = getActiveMessages();
  messagesDiv.innerHTML = '';
  if (msgs.length === 0) {
    messagesDiv.innerHTML = '<div class="empty-state">Send a message to start</div>';
    return;
  }
  for (let i = 0; i < msgs.length; i++) {
    messagesDiv.appendChild(createMsgWrap(msgs[i].role, msgs[i].content, i));
  }
  messagesDiv.scrollTop = messagesDiv.scrollHeight;
}

function createMsgWrap(role, content, index) {
  const wrap = document.createElement('div');
  wrap.className = `msg-wrap ${role}`;

  const msgDiv = document.createElement('div');
  msgDiv.className = `message ${role}`;
  msgDiv.innerHTML = `<div class="role-tag">${role}</div><div class="content">${content ? renderContent(content) : ''}</div>`;

  const actions = document.createElement('div');
  actions.className = 'msg-actions';

  if (role === 'user') {
    actions.innerHTML = `
      <button class="msg-action-btn" onclick="editMessage(${index})">Edit</button>
      <button class="msg-action-btn" onclick="deleteFromHere(${index})">Delete</button>
    `;
  } else {
    actions.innerHTML = `
      <button class="msg-action-btn" onclick="regenerate(${index})">Regenerate</button>
      <button class="msg-action-btn" onclick="deleteFromHere(${index})">Delete</button>
      <button class="msg-action-btn" onclick="copyMessage(${index})">Copy</button>
    `;
  }

  wrap.appendChild(msgDiv);
  wrap.appendChild(actions);
  return wrap;
}

// ---- Settings ----

function toggleSettings() {
  document.getElementById('settings-body').classList.toggle('collapsed');
}

function getSettings() {
  return {
    apiUrl: document.getElementById('api-url').value.trim(),
    temperature: parseFloat(tempSlider.value),
    maxTokens: parseInt(document.getElementById('max-tokens').value) || 512,
    systemPrompt: document.getElementById('system-prompt').value.trim(),
  };
}

function buildApiMessages(upToIndex) {
  const s = getSettings();
  const msgs = [];
  if (s.systemPrompt) msgs.push({ role: 'system', content: s.systemPrompt });
  const all = getActiveMessages();
  const end = upToIndex !== undefined ? upToIndex + 1 : all.length;
  for (let i = 0; i < end; i++) msgs.push({ ...all[i] });
  return msgs;
}

// ---- Message actions ----

function editMessage(index) {
  if (isGenerating) return;
  const msgs = getActiveMessages();
  const wraps = messagesDiv.querySelectorAll('.msg-wrap');
  const wrap = wraps[index];
  if (!wrap) return;

  const msgDiv = wrap.querySelector('.message');
  const actionsDiv = wrap.querySelector('.msg-actions');
  actionsDiv.style.display = 'none';
  const origHTML = msgDiv.innerHTML;

  msgDiv.innerHTML = '';
  const textarea = document.createElement('textarea');
  textarea.className = 'edit-area';
  textarea.value = msgs[index].content;
  msgDiv.appendChild(textarea);

  const btns = document.createElement('div');
  btns.className = 'edit-buttons';
  btns.innerHTML = '<button class="edit-save">Save & Submit</button><button class="edit-cancel">Cancel</button>';
  msgDiv.appendChild(btns);

  textarea.focus();
  textarea.setSelectionRange(textarea.value.length, textarea.value.length);

  btns.querySelector('.edit-cancel').onclick = () => {
    msgDiv.innerHTML = origHTML;
    actionsDiv.style.display = '';
  };

  btns.querySelector('.edit-save').onclick = () => {
    const newText = textarea.value.trim();
    if (!newText) return;
    msgs[index].content = newText;
    const truncated = msgs.slice(0, index + 1);
    setActiveMessages(truncated);
    updateTitle();
    renderChat();
    generateAssistantResponse(index);
  };

  textarea.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      btns.querySelector('.edit-save').click();
    }
  });
}

function deleteFromHere(index) {
  if (isGenerating) return;
  setActiveMessages(getActiveMessages().slice(0, index));
  updateTitle();
  renderChat();
}

function regenerate(index) {
  if (isGenerating) return;
  const msgs = getActiveMessages();
  const truncated = msgs.slice(0, index);
  setActiveMessages(truncated);
  renderChat();
  const lastUserIdx = truncated.length - 1;
  if (lastUserIdx >= 0 && truncated[lastUserIdx].role === 'user') {
    generateAssistantResponse(lastUserIdx);
  }
}

function copyMessage(index) {
  const msgs = getActiveMessages();
  if (msgs[index]) navigator.clipboard.writeText(msgs[index].content).catch(() => {});
}

function updateTitle() {
  if (!activeConvId || !conversations[activeConvId]) return;
  conversations[activeConvId].title = deriveTitle(getActiveMessages());
  saveAll();
  renderConvList();
}

// ---- Send / stream ----

async function sendMessage() {
  const text = inputEl.value.trim();
  if (!text || isGenerating) return;
  if (!activeConvId) newConversation();

  inputEl.value = '';
  inputEl.style.height = 'auto';

  const msgs = getActiveMessages();
  msgs.push({ role: 'user', content: text });
  setActiveMessages(msgs);
  updateTitle();
  renderChat();

  await generateAssistantResponse(msgs.length - 1);
}

async function generateAssistantResponse(afterUserIndex) {
  if (isGenerating) return;
  isGenerating = true;
  sendBtn.disabled = true;
  sendBtn.textContent = 'Stop';
  sendBtn.onclick = stopGeneration;

  const msgs = getActiveMessages();
  msgs.push({ role: 'assistant', content: '' });
  setActiveMessages(msgs);

  // Append streaming bubble
  const wrap = createMsgWrap('assistant', '', msgs.length - 1);
  const emptyEl = messagesDiv.querySelector('.empty-state');
  if (emptyEl) emptyEl.remove();
  messagesDiv.appendChild(wrap);
  const contentDiv = wrap.querySelector('.content');
  contentDiv.innerHTML = '<span class="cursor"></span>';
  messagesDiv.scrollTop = messagesDiv.scrollHeight;

  const s = getSettings();
  const apiMessages = buildApiMessages(afterUserIndex);

  abortController = new AbortController();
  let fullText = '';

  try {
    const res = await fetch(`${s.apiUrl}/v1/chat/completions`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        messages: apiMessages,
        temperature: s.temperature,
        max_tokens: s.maxTokens,
        stream: true,
      }),
      signal: abortController.signal,
    });

    if (!res.ok) throw new Error(`HTTP ${res.status}: ${await res.text()}`);

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop();

      for (const line of lines) {
        const trimmed = line.trim();
        if (!trimmed || !trimmed.startsWith('data: ')) continue;
        const data = trimmed.slice(6);
        if (data === '[DONE]') continue;
        try {
          const delta = JSON.parse(data).choices?.[0]?.delta;
          if (delta?.content) {
            fullText += delta.content;
            contentDiv.innerHTML = renderContent(fullText) + '<span class="cursor"></span>';
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
          }
        } catch (e) { /* skip */ }
      }
    }
  } catch (e) {
    if (e.name !== 'AbortError') {
      fullText += fullText ? '\n\n[Error: ' + e.message + ']' : '[Error: ' + e.message + ']';
    }
  }

  // Finalize
  const currentMsgs = getActiveMessages();
  currentMsgs[currentMsgs.length - 1].content = fullText;
  setActiveMessages(currentMsgs);
  renderChat();

  isGenerating = false;
  abortController = null;
  sendBtn.disabled = false;
  sendBtn.textContent = 'Send';
  sendBtn.onclick = sendMessage;
}

function stopGeneration() {
  if (abortController) abortController.abort();
}

// ---- Init ----

inputEl.addEventListener('input', () => {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 150) + 'px';
});

inputEl.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

tempSlider.addEventListener('input', () => {
  tempVal.textContent = parseFloat(tempSlider.value).toFixed(2);
});

// Boot
loadAll();
if (!activeConvId || !conversations[activeConvId]) {
  newConversation();
} else {
  renderConvList();
  renderChat();
}
</script>

</body>
</html>
